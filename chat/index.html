<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Replace these values for the /ig/ page. -->
    <title>Model on Instagram</title>
    <meta name="description" content="Open Model's Instagram profile" />

    <!-- Open Graph preview for messengers and social networks. -->

    <link rel="canonical" href="https://domain.com/ig/" />

    <!-- Replace the URL below with the destination for https://domain.com/ig/. -->
    <meta http-equiv="refresh" content="0;url=https://instagram.com/model" />
  </head>
  <body>
    <script>
      (function () {
        var targetUrl = "https://instagram.com/model";
        window.location.replace(targetUrl);
